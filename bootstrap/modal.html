<!DOCTYPE html>
<html>
    <head>
        <title>Modal Example</title>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
    </head>
    <body>
        <div class="container mt-3">
            <h2>Modal</h2>
            <h4>The modal component is a dialog box/popup window that is displayed on top of the current page</h4>
            <p> click on the button to open</p>
            <button type="button" class="btn-btn-primary" data-bs-toggle="modal" data-bs-target="#modal1"> open</button>

            <!--Modal-->
            <div class="modal" id="modal1">
                <div class="modal-dialog">
                    <div class="modal-content">

                        <!--model header-->
                        <div class="modal-header">
                            <h3 class="modal-title"> This modal heading section</h3>
                            <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                        </div>

                        <!--modal body-->
                        <div class="modal-body">Modal body</div>

                        <!--modal footer-->
                        <div class="modal-footer">
                            <button type="button" class="btn-btn-danger" data-bs-dismiss="modal">Close</button>
                        </div>

                    </div>

                </div>
            </div>

        </div>
        
    </body>
</html>
