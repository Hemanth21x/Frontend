<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flag</title>
    <style>
        body{
            margin: 0;
        }
        .flag{
            width: 500px;
            padding: 500px;
            background: linear-gradient(to bottom right, rgb(219, 148, 4),rgb(255, 255, 255),rgb(76,188,34)) ;
            background-repeat: no-repeat;
            background-size: cover;
            position: relative;
        }
        .ring{
            width: 60px;
            padding: 120px;
            border-radius: 50%;
            position: absolute;
            top: 300px;
            left: 500px;
            background:conic-gradient();
        }
    </style>
</head>
<body>
    <div class="flag"></div>
    <div class="ring">
        <svg width="200" height="200">

<!-- outer circle -->
<circle cx="100" cy="100" r="80" stroke="blue" stroke-width="4" fill="none"/>

 <g stroke="blue">

    <line x1="100" y1="100" x2="100" y2="20" transform="rotate(0 100 100)"/>
    <line x1="100" y1="100" x2="100" y2="20" transform="rotate(11.25 100 100)"/>
